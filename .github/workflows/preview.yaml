name: Preview Docs

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[docs]"
      - run: |
          git fetch origin
          mike deploy dev -p --allow-empty
          site_url=$(python - <<'PY'
          from pathlib import Path

          for line in Path("mkdocs.yml").read_text(encoding="utf-8").splitlines():
              if line.startswith("site_url:"):
                  print(line.split(":", 1)[1].strip().rstrip("/"))
                  break
          else:
              raise SystemExit("site_url not found in mkdocs.yml")
          PY
          )
          preview_url="${site_url}/dev/"
          echo "PREVIEW_URL=${preview_url}" >> "$GITHUB_ENV"
          echo "Preview URL: ${preview_url}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with Preview Link
        uses: actions/github-script@v6
        with:
          script: |
            const { payload, repo } = context;
            const previewLink = process.env.PREVIEW_URL;
            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: payload.number,
            });
            const body = `Preview available at: ${previewLink}`;
            const existingComment = comments.data.find(comment =>
              comment.body.includes('Preview available at:') && comment.user?.type === 'Bot'
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: payload.number,
                body,
              });
            }
